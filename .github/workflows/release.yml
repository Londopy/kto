name: release

# Builds release binaries for Linux/macOS/Windows, packages them, builds a
# Windows .exe installer with Inno Setup, generates SHA-256 checksums, and
# publishes a GitHub release. Triggered by pushing a `vX.Y.Z` tag.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading v), for manual runs"
        required: false

permissions:
  contents: write

env:
  BIN_NAME: kto

jobs:
  # ---------------------------------------------------------------------------
  # Build + package one archive per target.
  # ---------------------------------------------------------------------------
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: tar.gz
            cross: true
          - os: macos-13
            target: x86_64-apple-darwin
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "asset=${BIN_NAME}-$V-${{ matrix.target }}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Build C++ GUI (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cmake -S gui-cpp -B gui-cpp/build -A x64
          cmake --build gui-cpp/build --config Release

      - name: Package
        id: pkg
        shell: bash
        run: |
          DIR="${{ steps.ver.outputs.asset }}"
          EXE=""
          [ "${{ matrix.os }}" = "windows-latest" ] && EXE=".exe"
          mkdir -p "stage/$DIR"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}${EXE}" "stage/$DIR/"
          cp README.md LICENSE CHANGELOG.md "stage/$DIR/"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then cp gui-cpp/build/Release/kto-gui.exe "stage/$DIR/"; fi
          cd stage
          if [ "${{ matrix.ext }}" = "zip" ]; then
            7z a "../${DIR}.zip" "$DIR" >/dev/null
            echo "file=${DIR}.zip" >> "$GITHUB_OUTPUT"
          else
            tar czf "../${DIR}.tar.gz" "$DIR"
            echo "file=${DIR}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Checksum
        shell: bash
        run: |
          FILE="${{ steps.pkg.outputs.file }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$FILE" > "$FILE.sha256"
          else
            shasum -a 256 "$FILE" > "$FILE.sha256"
          fi
          cat "$FILE.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: |
            ${{ steps.pkg.outputs.file }}
            ${{ steps.pkg.outputs.file }}.sha256
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Build the Windows .exe installer from the windows zip.
  # ---------------------------------------------------------------------------
  installer:
    name: windows installer
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-x86_64-pc-windows-msvc
          path: artifact

      - name: Stage files for installer
        shell: bash
        run: |
          mkdir -p dist unz
          7z x artifact/${BIN_NAME}-*-x86_64-pc-windows-msvc.zip -ounz >/dev/null
          cp unz/*/${BIN_NAME}.exe dist/
          cp unz/*/kto-gui.exe dist/
          cp README.md LICENSE CHANGELOG.md dist/
          cp assets/icon.ico dist/

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: bash
        run: |
          V="${{ steps.ver.outputs.version }}"
          ISCC="/c/Program Files (x86)/Inno Setup 6/ISCC.exe"
          # Inno resolves relative paths against the .iss dir, so pass an absolute one.
          SRC="$(cygpath -w "$(pwd)/dist")"
          "$ISCC" "/DMyAppVersion=$V" "/DSourceDir=$SRC" installer/kto.iss

      - name: Checksum installer
        shell: bash
        run: |
          cd installer/installer-out
          for f in *.exe; do sha256sum "$f" > "$f.sha256"; cat "$f.sha256"; done

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-installer
          path: |
            installer/installer-out/*.exe
            installer/installer-out/*.sha256
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Collect everything, build a combined SHA256SUMS, publish the release.
  # ---------------------------------------------------------------------------
  release:
    name: publish release
    needs: [build, installer]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: dist-*
          merge-multiple: true

      - name: Build combined SHA256SUMS
        shell: bash
        run: |
          V="${{ steps.ver.outputs.version }}"
          cd artifacts
          SUMS="${BIN_NAME}-$V-SHA256SUMS.txt"
          : > "$SUMS"
          # Each per-file .sha256 already contains "<hash>  <filename>".
          for f in *.sha256; do
            [ "$f" = "$SUMS" ] && continue
            cat "$f" >> "$SUMS"
          done
          echo "----- $SUMS -----"
          cat "$SUMS"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
            artifacts/*.exe
            artifacts/${{ env.BIN_NAME }}-*-SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
