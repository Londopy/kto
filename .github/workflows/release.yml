name: release

# Builds Windows binaries (x64 / x86 / ARM64), a GUI + installer for each,
# SHA-256 checksums, and publishes a GitHub release. Triggered by a vX.Y.Z tag.
# x86 and ARM64 are marked experimental so they can never block the x64 release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading v), for manual runs"
        required: false

permissions:
  contents: write

env:
  BIN_NAME: kto

jobs:
  build:
    name: build (windows ${{ matrix.arch }})
    runs-on: windows-latest
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x64,   target: x86_64-pc-windows-msvc,  cmake_platform: x64,   arch_allowed: x64compatible, arch_64: x64compatible }
          - { arch: x86,   target: i686-pc-windows-msvc,    cmake_platform: Win32, arch_allowed: x86compatible, arch_64: "",            experimental: true }
          - { arch: arm64, target: aarch64-pc-windows-msvc, cmake_platform: ARM64, arch_allowed: arm64,         arch_64: arm64,         experimental: true }
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "asset=${BIN_NAME}-$V-windows-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (kto.exe)
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build C++ GUI
        shell: bash
        run: |
          cmake -S gui-cpp -B gui-cpp/build -A ${{ matrix.cmake_platform }}
          cmake --build gui-cpp/build --config Release

      - name: Stage files
        id: stage
        shell: bash
        run: |
          DIR="${{ steps.ver.outputs.asset }}"
          mkdir -p "dist/$DIR"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}.exe" "dist/$DIR/"
          cp gui-cpp/build/Release/kto-gui.exe "dist/$DIR/"
          cp README.md LICENSE CHANGELOG.md assets/icon.ico "dist/$DIR/"
          ( cd dist && 7z a "$DIR.zip" "$DIR" >/dev/null )
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $src  = "${{ github.workspace }}\dist\${{ steps.stage.outputs.dir }}"
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.version }}" "/DMyArch=${{ matrix.arch }}" "/DArchAllowed=${{ matrix.arch_allowed }}" "/DArch64=${{ matrix.arch_64 }}" "/DSourceDir=$src" "installer/kto.iss"

      - name: Checksums
        shell: bash
        run: |
          cd dist
          for f in *.zip; do sha256sum "$f" > "$f.sha256"; done
          cp ../installer/installer-out/*.exe . 2>/dev/null || true
          for f in *.exe; do [ -f "$f" ] && sha256sum "$f" > "$f.sha256"; done
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.arch }}
          path: |
            dist/*.zip
            dist/*.exe
            dist/*.sha256
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: dist-*
          merge-multiple: true

      - name: Build combined SHA256SUMS
        shell: bash
        run: |
          V="${{ steps.ver.outputs.version }}"
          cd artifacts
          SUMS="${BIN_NAME}-$V-SHA256SUMS.txt"
          : > "$SUMS"
          for f in *.sha256; do [ "$f" = "$SUMS" ] && continue; cat "$f" >> "$SUMS"; done
          cat "$SUMS"

      - name: Compose release body
        shell: bash
        run: python3 scripts/compose_release_body.py "${{ steps.ver.outputs.version }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_BODY.md
          files: |
            artifacts/*.zip
            artifacts/*.exe
            artifacts/${{ env.BIN_NAME }}-*-SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: false
